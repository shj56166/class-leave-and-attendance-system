version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: qingjia_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qingjia_db}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_EXPOSE_BIND:-127.0.0.1}:${MYSQL_EXPOSE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - qingjia_network
    restart: unless-stopped

  server:
    build: ./server
    container_name: qingjia_server
    ports:
      - "${SERVER_EXPOSE_BIND:-127.0.0.1}:${SERVER_EXPOSE_PORT:-3000}:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-qingjia_db}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      JPUSH_APP_KEY: ${JPUSH_APP_KEY:-}
      JPUSH_MASTER_SECRET: ${JPUSH_MASTER_SECRET:-}
    depends_on:
      - mysql
    networks:
      - qingjia_network
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: qingjia_nginx
    ports:
      - "${NGINX_STUDENT_PORT:-8090}:8090"
      - "${NGINX_TEACHER_PORT:-8091}:8091"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./student-app/dist:/usr/share/nginx/html/student:ro
      - ./teacher-app/dist:/usr/share/nginx/html/teacher:ro
    depends_on:
      - server
    networks:
      - qingjia_network
    restart: unless-stopped

  backup:
    image: mysql:8.0
    container_name: qingjia_backup
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qingjia_db}
      MYSQL_USER: ${BACKUP_DB_USER}
      MYSQL_PASSWORD: ${BACKUP_DB_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    depends_on:
      - mysql
    networks:
      - qingjia_network
    entrypoint: /bin/sh
    command: -c "while true; do sleep 86400; /backup.sh; done"
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  qingjia_network:
    driver: bridge
